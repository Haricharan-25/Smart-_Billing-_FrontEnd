/* ===== PREMIUM GOLD DASHBOARD THEME OVERRIDE ===== */
:root{
  --pg-bg:#fdfbf6;
  --pg-surface:#ffffff;
  --pg-dark:#1c1917;
  --pg-dark-2:#292524;
  --pg-border:#f0ebe0;
  --pg-text:#1c1917;
  --pg-secondary:#57534e;
  --pg-muted:#a8a29e;
  --pg-gold-50:#fdf6e3;
  --pg-gold-200:#f5e6b8;
  --pg-gold-300:#ecd18a;
  --pg-gold-500:#e0b84f;
  --pg-gold-600:#d4af37;
  --pg-gold-700:#b8860b;
  --pg-success:#15803d;
  --pg-danger:#b91c1c;
  --pg-shadow:0 2px 10px rgba(28,25,23,.05);
}
html,body{background:var(--pg-bg)!important;color:var(--pg-text)!important;}
.animated-background{background:var(--pg-bg)!important;}
.mesh-gradient{
  background:
    radial-gradient(circle at 85% 12%,rgba(212,175,55,.16),transparent 30%),
    radial-gradient(circle at 12% 80%,rgba(236,209,138,.20),transparent 30%)!important;
}
.particle-canvas{opacity:.22!important;}

.sidebar{
  background:linear-gradient(180deg,var(--pg-dark),var(--pg-dark-2))!important;
  border-right:1px solid rgba(212,175,55,.18)!important;
  box-shadow:8px 0 30px rgba(28,25,23,.08)!important;
}
.logo-text h3{color:#fdfbf6!important;}
.logo-text p{color:var(--pg-gold-300)!important;}
.menu-item{color:#d6d3d1!important;border-radius:8px!important;}
.menu-item:hover{background:rgba(212,175,55,.10)!important;color:var(--pg-gold-300)!important;}
.menu-item.active{
  background:linear-gradient(135deg,rgba(184,134,11,.25),rgba(212,175,55,.12))!important;
  color:var(--pg-gold-300)!important;
  border:1px solid rgba(212,175,55,.20)!important;
}
.menu-item.active i,.menu-item:hover i{color:var(--pg-gold-500)!important;}
.active-indicator{background:var(--pg-gold-600)!important;box-shadow:0 0 12px rgba(212,175,55,.55)!important;}
.menu-divider{background:rgba(212,175,55,.14)!important;}
.logout-btn{
  background:rgba(255,255,255,.04)!important;
  color:#d6d3d1!important;
  border:1px solid rgba(212,175,55,.14)!important;
}
.logout-btn:hover{background:rgba(212,175,55,.12)!important;color:var(--pg-gold-300)!important;}

.main-content{background:transparent!important;}
.topbar{
  background:rgba(253,251,246,.92)!important;
  border-bottom:1px solid var(--pg-border)!important;
  backdrop-filter:blur(18px)!important;
  box-shadow:0 4px 20px rgba(28,25,23,.04)!important;
}
.menu-toggle{color:var(--pg-text)!important;}
.user-name{color:var(--pg-text)!important;}
.user-info p:not(.user-name){color:var(--pg-muted)!important;}
#userAvatar{border:2px solid var(--pg-gold-300)!important;}
.btn-new-invoice{
  background:linear-gradient(135deg,var(--pg-gold-700),var(--pg-gold-600))!important;
  color:#fff!important;
  border:none!important;
  box-shadow:0 8px 22px rgba(184,134,11,.25)!important;
}
.btn-new-invoice:hover{box-shadow:0 12px 30px rgba(184,134,11,.34)!important;transform:translateY(-1px)!important;}

.dashboard-container{background:transparent!important;}
.welcome-card{
  background:linear-gradient(135deg,var(--pg-dark),#3a3022)!important;
  border:1px solid rgba(212,175,55,.22)!important;
  box-shadow:0 16px 45px rgba(28,25,23,.12)!important;
}
.welcome-card h1{color:#fdfbf6!important;}
.welcome-card h1 span{color:var(--pg-gold-300)!important;}
.welcome-card p{color:#d6d3d1!important;}

.stat-card,.card-section{
  background:var(--pg-surface)!important;
  border:1px solid var(--pg-border)!important;
  border-radius:12px!important;
  box-shadow:var(--pg-shadow)!important;
}
.stat-card:hover,.card-section:hover{
  border-color:var(--pg-gold-200)!important;
  box-shadow:0 14px 36px rgba(28,25,23,.08)!important;
}
.stat-label{color:var(--pg-muted)!important;}
.stat-value,.section-header h3{color:var(--pg-text)!important;}
.stat-icon{
  background:var(--pg-gold-50)!important;
  color:var(--pg-gold-700)!important;
  border:1px solid var(--pg-gold-200)!important;
}
.stat-icon.success,.stat-icon.info{
  background:var(--pg-gold-50)!important;
  color:var(--pg-gold-700)!important;
}
.chart-container,.chart-small-container{background:#fff!important;}

.toast.text-bg-dark{
  background:var(--pg-dark)!important;
  border:1px solid rgba(212,175,55,.28)!important;
  color:#fdfbf6!important;
}

::selection{background:var(--pg-gold-200);color:var(--pg-text);}
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:var(--pg-bg);}
::-webkit-scrollbar-thumb{background:var(--pg-gold-300);border-radius:10px;border:2px solid var(--pg-bg);}
::-webkit-scrollbar-thumb:hover{background:var(--pg-gold-600);}

</style>

  <!-- =====================================================
       PAGE JAVASCRIPT
  ====================================================== -->

  <script>


    // =====================================================
    // LOAD USER INFORMATION
    // =====================================================

    document.addEventListener(
      "DOMContentLoaded",
      () => {

        const currentUserString =
          localStorage.getItem("currentUser");


        if (!currentUserString) {

          window.location.href =
            "login.html";

          return;
        }


        let currentUser;


        try {

          currentUser =
            JSON.parse(currentUserString);

        } catch (error) {

          console.error(
            "Invalid currentUser data:",
            error
          );


          localStorage.removeItem(
            "currentUser"
          );


          window.location.href =
            "login.html";

          return;
        }


        const fullName =
          `${currentUser.first_name || ""} ${currentUser.last_name || ""}`;


        const displayName =
          fullName.trim()
          ||
          currentUser.username
          ||
          "User";


        document.getElementById(
          "welcomeName"
        ).textContent = displayName;


        document.getElementById(
          "topUserName"
        ).textContent = displayName;


        document.getElementById(
          "userAvatar"
        ).src =
          `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=B8860B&color=fff`;

      }
    );


    // =====================================================
    // TOAST FUNCTION
    // =====================================================

    function showToast(message) {

      const toastMessage =
        document.getElementById(
          "toastMessage"
        );


      const toastElement =
        document.getElementById(
          "liveToast"
        );


      if (!toastMessage || !toastElement) {

        console.error(
          "Toast elements not found."
        );

        return;
      }


      toastMessage.textContent =
        message;


      const toast =
        bootstrap.Toast.getOrCreateInstance(
          toastElement,
          {
            delay: 1000
          }
        );


      toast.show();

    }


    // =====================================================
    // LOGOUT FUNCTION
    // =====================================================

    async function logout() {

      const accessToken =
        localStorage.getItem(
          "accessToken"
        );


      const refreshToken =
        localStorage.getItem(
          "refreshToken"
        );


      try {


        // CALL BACKEND LOGOUT API

        if (accessToken && refreshToken) {

          const response = await fetch(
            "http://127.0.0.1:8000/api/logout/",
            {

              method: "POST",


              headers: {

                "Content-Type":
                  "application/json",

                "Authorization":
                  `Bearer ${accessToken}`

              },


              body: JSON.stringify({

                refresh:
                  refreshToken

              })

            }
          );


          let data = {};


          try {

            data =
              await response.json();

          } catch (jsonError) {

            console.warn(
              "Logout response was not JSON."
            );

          }


          console.log(
            "Logout response:",
            data
          );


          if (!response.ok) {

            console.warn(
              "Backend logout returned:",
              response.status,
              data
            );

          }

        }


        // SHOW SUCCESS TOAST

        showToast(
          "Logged out successfully"
        );


        // WAIT FOR TOAST BEFORE REDIRECT

        setTimeout(
          () => {


            localStorage.removeItem(
              "accessToken"
            );


            localStorage.removeItem(
              "refreshToken"
            );


            localStorage.removeItem(
              "currentUser"
            );


            localStorage.removeItem(
              "userRole"
            );


            window.location.href =
              "login.html";


          },
          1200
        );


      } catch (error) {


        console.error(
          "Logout error:",
          error
        );


        showToast(
          "Logout failed. Please try again."
        );

      }

    }

  </script>
