<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Billing - Enterprise Control Panel</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-dark: #050b14;
            --surface-glass: rgba(10, 22, 37, 0.7);
            --border-glass: rgba(0, 212, 255, 0.15);
            --primary: #0A84FF;
            --secondary: #4DA3FF;
            --accent-glow: #00D4FF;
            --text-main: #FFFFFF;
            --text-muted: #9EAEB8;
            --success-glow: #00FFCC;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-columns: 460px 1fr; 
            overflow: hidden;
            position: relative;
        }

        #gridCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none;
        }

        /* --- BACK BUTTON STYLES --- */
        .nav-header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .back-dashboard-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(10, 132, 255, 0.1);
            border: 1px solid var(--border-glass);
            color: var(--accent-glow);
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-dashboard-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(10, 132, 255, 0.4);
            transform: translateX(5px);
        }

        /* LEFT SIDE */
     .control-deck {
    background: linear-gradient(180deg, rgba(10,22,37,.9) 0%, rgba(5,11,20,.98) 100%);
    border-right:1px solid var(--border-glass);
    backdrop-filter:blur(20px);
    padding:5rem 2rem 1.5rem;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}
.control-deck > div:first-child{
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
}
        /* RIGHT SIDE */
        .ledger-view {
            background: rgba(7, 17, 31, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .ledger-header {
            padding: 1.75rem 2.5rem;
            background: rgba(10, 22, 37, 0.5);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1.35rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-main); text-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
            display: flex; align-items: center; gap: 0.85rem; margin-bottom: 0.5rem;
        }

       .form-container{
    margin-top:1rem;
    display:flex;
    flex-direction:column;
    gap:1rem;
    flex:1;
    overflow-y:auto;
    padding-right:8px;
}

        .input-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        input {
            width: 100%; padding: 0.85rem 1.1rem; background: rgba(5, 11, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 8px; color: var(--text-main); transition: all 0.25s ease;
        }
        input:focus { outline: none; border-color: var(--accent-glow); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }

       .deck-footer{
    flex-shrink:0;
    border-top:1px solid rgba(255,255,255,.08);
    padding-top:15px;
    margin-top:15px;
    background:#07111f;
}

        .action-btn {
            background: linear-gradient(135deg, var(--primary) 0%, #0052D4) 100%;
            color: #ffffff; border: none; padding: 0.9rem; border-radius: 8px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .action-btn.secondary-action { background: rgba(10, 22, 37, 0.8); border: 1px solid var(--border-glass); color: var(--accent-glow); }
        .action-btn:hover { box-shadow: 0 0 22px rgba(0, 212, 255, 0.6); transform: translateY(-1px); }

        /* TABLE STYLES */
        .table-wrapper { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 1.25rem 2.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        th { position: sticky; top: 0; background-color: #08121f; color: var(--secondary); font-size: 0.85rem; text-transform: uppercase; z-index: 1; }
        tr:hover { background-color: rgba(10, 132, 255, 0.05); }

        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; transition: 0.2s; margin-right: 10px; }
        .btn-icon:hover { color: var(--accent-glow); }
        .btn-delete:hover { color: var(--danger); }

        /* MODAL */
        .invoice-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 7, 13, 0.85);
            backdrop-filter: blur(12px); z-index: 100; display: none; align-items: center; justify-content: center;
        }
        .invoice-overlay.active { display: flex; }
        .invoice-box { background: #0c1625; border: 1px solid var(--accent-glow); width: 650px; border-radius: 12px; padding: 2.5rem; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .standard-badge { background: rgba(0, 212, 255, 0.1); color: var(--accent-glow); border: 1px solid var(--accent-glow); }
    

/* PREMIUM GOLD THEME — Customer Ledger */
:root{
--pg-bg:#fdfbf6;--pg-surface:#fff;--pg-dark:#1c1917;--pg-dark2:#292524;
--pg-border:#f0ebe0;--pg-text:#1c1917;--pg-secondary:#57534e;--pg-muted:#a8a29e;
--pg-gold50:#fdf6e3;--pg-gold200:#f5e6b8;--pg-gold300:#ecd18a;
--pg-gold500:#e0b84f;--pg-gold600:#d4af37;--pg-gold700:#b8860b;
--bg-dark:#fdfbf6;--surface-glass:#fff;--border-glass:#f0ebe0;
--primary:#b8860b;--secondary:#d4af37;--accent-glow:#b8860b;
--text-main:#1c1917;--text-muted:#a8a29e;--success-glow:#15803d;
}
body{background:var(--pg-bg)!important;color:var(--pg-text)!important;}
#gridCanvas{opacity:.18!important;}
.back-dashboard-btn{background:#fff!important;border-color:var(--pg-gold200)!important;color:var(--pg-gold700)!important;box-shadow:0 2px 10px rgba(28,25,23,.05)!important;}
.back-dashboard-btn:hover{background:linear-gradient(135deg,var(--pg-gold700),var(--pg-gold600))!important;color:#fff!important;box-shadow:0 10px 25px rgba(184,134,11,.28)!important;}
.control-deck{background:linear-gradient(180deg,var(--pg-dark),var(--pg-dark2))!important;border-right:1px solid rgba(212,175,55,.18)!important;}
.control-deck .section-title{color:#fdfbf6!important;text-shadow:none!important;}
.control-deck .section-title i{color:var(--pg-gold300)!important;}
.control-deck label{color:#d6d3d1!important;}
.control-deck input{background:rgba(255,255,255,.06)!important;border-color:rgba(212,175,55,.16)!important;color:#fdfbf6!important;}
.control-deck input::placeholder{color:#78716c!important;}
.control-deck input:focus{border-color:var(--pg-gold600)!important;box-shadow:0 0 0 3px rgba(212,175,55,.13)!important;}
.deck-footer{background:var(--pg-dark2)!important;border-top-color:rgba(212,175,55,.15)!important;}
.action-btn{background:linear-gradient(135deg,var(--pg-gold700),var(--pg-gold600))!important;box-shadow:0 8px 22px rgba(184,134,11,.2)!important;}
.action-btn.secondary-action{background:rgba(255,255,255,.05)!important;border-color:rgba(212,175,55,.2)!important;color:var(--pg-gold300)!important;}
.action-btn:hover{box-shadow:0 12px 28px rgba(184,134,11,.32)!important;}
.ledger-view{background:radial-gradient(circle at 85% 10%,rgba(212,175,55,.14),transparent 30%),var(--pg-bg)!important;}
.ledger-header{background:rgba(253,251,246,.94)!important;border-bottom:1px solid var(--pg-border)!important;}
.ledger-header .section-title{color:var(--pg-text)!important;text-shadow:none!important;}
.ledger-header .section-title i{color:var(--pg-gold700)!important;}
th{background:var(--pg-gold50)!important;color:var(--pg-gold700)!important;border-bottom:1px solid var(--pg-gold200)!important;}
td{color:var(--pg-text)!important;border-bottom:1px solid var(--pg-border)!important;}
tr:hover{background:var(--pg-gold50)!important;}
td small{color:var(--pg-muted)!important;}
.btn-icon{color:var(--pg-secondary)!important;}
.btn-icon:hover{color:var(--pg-gold700)!important;}
.btn-delete:hover{color:#b91c1c!important;}
.invoice-overlay{background:rgba(28,25,23,.7)!important;}
.invoice-box{background:#fff!important;color:var(--pg-text)!important;border:1px solid var(--pg-gold300)!important;box-shadow:0 30px 80px rgba(28,25,23,.25)!important;}
.invoice-box h2{color:var(--pg-gold700)!important;}
.standard-badge{background:var(--pg-gold50)!important;color:var(--pg-gold700)!important;border-color:var(--pg-gold300)!important;}
::selection{background:var(--pg-gold200);color:var(--pg-text);}
::-webkit-scrollbar{width:9px;}
::-webkit-scrollbar-track{background:var(--pg-dark2);}
::-webkit-scrollbar-thumb{background:var(--pg-gold300);border-radius:10px;}
@media(max-width:900px){
body{display:block!important;overflow:auto!important;}
.control-deck{width:100%!important;height:auto!important;min-height:100vh;}
.ledger-view{min-height:100vh;}
}

</style>
</head>
<body>

<!-- Floating Back Button -->
<div class="nav-header">
    <a href="dashboard.html" class="back-dashboard-btn">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
</div>

<canvas id="gridCanvas"></canvas>

<section class="control-deck">
    <div>
        <h2 class="section-title"><i class="bx bx-id-card"></i> Profile Entry</h2>
        <form id="billingForm" class="form-container">
            <input type="hidden" id="edit-index" value="-1">
           
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="cust-name" placeholder="Alex Rivera" required>
            </div>
            <div class="input-group">
                <label>Contact Number</label>
               <input
    type="tel"
    id="cust-phone"
    placeholder="Enter 10-digit Mobile Number"
    maxlength="10"
    pattern="[0-9]{10}"
    inputmode="numeric"
    required
>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="cust-email" placeholder="alex@example.com" required>
            </div>
        
           <div class="input-group">
    <label>GST Number</label>
    <input type="text"
           id="cust-gst"
           placeholder="Enter GST Number">
</div>

<div class="input-group">
    <label>Street Address</label>
    <input type="text"
           id="cust-address"
           placeholder="Enter Street Address">
</div>

<div class="input-group">
    <label>City</label>
    <input type="text"
           id="cust-city"
           placeholder="Enter City">
</div>

<div class="input-group">
    <label>State</label>
    <input type="text"
           id="cust-state"
           placeholder="Enter State">
</div>

<div class="input-group">
    <label>Pincode</label>
    <input type="text"
           id="cust-pincode"
           placeholder="Enter Pincode">
</div>
        </form>
    </div>

    <div class="deck-footer">
        <p style="font-size: 0.75rem; color: var(--text-muted);">Status: <span id="status-text" style="color: var(--success-glow);">Ready</span></p>
        <div class="action-button-group">
            <button type="button" onclick="clearForm()" class="action-btn secondary-action">Reset</button>
            <button type="button" id="submitBtn" class="action-btn"><i class="bx bx-check-shield"></i> Commit</button>
        </div>
    </div>
</section>

<main class="ledger-view">
    <header class="ledger-header">
        <h3 class="section-title"><i class="bx bx-server"></i> Active Ledger</h3>
    </header>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Invoice ID</th>
                    <th>Customer Name</th>
                    <th>Contact</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<!-- Invoice Modal -->
<div class="invoice-overlay" id="invoiceOverlay">
    <div class="invoice-box">
        <h2 style="color:var(--accent-glow)">INVOICE PREVIEW</h2>
        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #333;">
        <div id="invoiceContent" style="line-height: 1.8;"></div>
        <button class="action-btn" style="margin-top:20px; width:100%" onclick="closeInvoice()">Close Manifest</button>
    </div>
</div>

<script>
    // --- CANVAS ANIMATION ---
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = 'rgba(212, 175, 55, 0.05)';
        for(let i=0; i<canvas.width; i+=50){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=50){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        requestAnimationFrame(animate);
    }
    animate();

    // --- CORE LOGIC ---
    const form = document.getElementById('billingForm');
    const tableBody = document.getElementById('tableBody');
    const editIndexField = document.getElementById('edit-index');

    // Allow only 10 digits
document.getElementById("cust-phone").addEventListener("input", function () {
    this.value = this.value.replace(/\D/g, "").slice(0, 10);
});
    
async function renderTable() {

    const token = localStorage.getItem("accessToken");

    const response = await fetch(
        "http://127.0.0.1:8000/api/customers/",
        {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        }
    );
if(response.status===401){

    localStorage.clear();

    window.location.href="login.html";

    return;

}

if(!response.ok){

    console.error(await response.text());

    return;

}

    const customers = await response.json();

    tableBody.innerHTML = "";

    customers.forEach(customer => {

        tableBody.innerHTML += `
        <tr>

            <td>INV-${String(customer.id).padStart(6,"0")}</td>

            <td><strong>${customer.full_name}</strong></td>

            <td>
                ${customer.phone}<br>
                <small>${customer.email ?? ""}</small>
            </td>

            <td>${customer.address}</td>

            <td>

                <button class="btn-icon"
                    onclick="editCustomer(${customer.id})">

                    <i class="bx bx-edit-alt"></i>

                </button>

                <button class="btn-icon btn-delete"
                    onclick="deleteCustomer(${customer.id})">

                    <i class="bx bx-trash"></i>

                </button>

            </td>

        </tr>
        `;

    });

}
document.getElementById("submitBtn").addEventListener("click", saveCustomer);
async function saveCustomer() {

    if (
        !document.getElementById("cust-name").value.trim() ||
        !document.getElementById("cust-phone").value.trim() ||
        !document.getElementById("cust-email").value.trim()
    ) {
        showToast("Please fill all required fields.", "error");
        return;
    }

    const customer = {
        

    full_name: document.getElementById("cust-name").value.trim(),

    phone: document.getElementById("cust-phone").value.trim(),

    email: document.getElementById("cust-email").value.trim(),

    gst_number: document.getElementById("cust-gst").value.trim(),

    address: document.getElementById("cust-address").value.trim(),

    city: document.getElementById("cust-city").value.trim(),

    state: document.getElementById("cust-state").value.trim(),

    pincode: document.getElementById("cust-pincode").value.trim()

};
const customerId =
    document.getElementById("edit-index").value;
   const token = localStorage.getItem("accessToken");

const url =
    customerId == "-1"
        ? "http://127.0.0.1:8000/api/customers/"
        : `http://127.0.0.1:8000/api/customers/${customerId}/`;

const method =
    customerId == "-1"
        ? "POST"
        : "PATCH";

const response = await fetch(url,{
    
    method:method,
    headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${token}`
    },
    body:JSON.stringify(customer)
});
if(response.status===401){

    localStorage.clear();
    window.location.href="login.html";
    return;

}

if (response.ok) {

showToast(
    customerId == "-1"
        ? "Customer added successfully!"
        : "Customer updated successfully!",
    "success"
);

clearForm();

renderTable();

} else {

  const error = await response.json();

console.log(error);

const message =
    error.message ||
    Object.values(error).flat().join("\n") ||
    "Something went wrong";

showToast(message, "error");

}
}
function clearForm() {

    form.reset();

    editIndexField.value = "-1";

    document.getElementById("submitBtn").innerHTML =
        '<i class="bx bx-check-shield"></i> Commit';

}
async function deleteCustomer(id) {

    if (!confirm("Delete this customer?")) return;
const token = localStorage.getItem("accessToken");

const response = await fetch(
    `http://127.0.0.1:8000/api/customers/${id}/`,
    {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${token}`
        }
    }
);
if(response.status===401){

    localStorage.clear();
    window.location.href="login.html";
    return;

}
    if (response.ok) {

        showToast("Customer deleted successfully!", "success");

        renderTable();

    } else {

        showToast("Failed to delete customer", "error");

    }

}
async function editCustomer(id) {

    const token = localStorage.getItem("accessToken");

    const response = await fetch(
        `http://127.0.0.1:8000/api/customers/${id}/`,
        {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        }
    );

   if(response.status===401){

    localStorage.clear();

    window.location.href="login.html";

    return;

}

if (!response.ok) {

    console.error(await response.text());

    showToast("Failed to load customer details.", "error");

    return;
}

    const customer = await response.json();

    document.getElementById("cust-name").value = customer.full_name || "";
    document.getElementById("cust-phone").value = customer.phone || "";
    document.getElementById("cust-email").value = customer.email || "";
    document.getElementById("cust-gst").value = customer.gst_number || "";
    document.getElementById("cust-address").value = customer.address || "";
    document.getElementById("cust-city").value = customer.city || "";
    document.getElementById("cust-state").value = customer.state || "";
    document.getElementById("cust-pincode").value = customer.pincode || "";

    document.getElementById("edit-index").value = id;

    document.getElementById("submitBtn").innerHTML =
        '<i class="bx bx-edit"></i> Update Customer';
}



    function closeInvoice() {
        document.getElementById('invoiceOverlay').classList.remove('active');
    }

    // Initialize
   
    renderTable();
  function showToast(message, type="success"){

    const toast=document.getElementById("liveToast");
    const body=document.getElementById("toastMessage");

    body.innerText=message;

    toast.className="toast show";

    if(type==="success"){
        toast.style.background="#198754";
    }else{
        toast.style.background="#dc3545";
    }

    setTimeout(()=>{
        toast.classList.remove("show");
    },3000);
}
</script>
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;">

    <div id="liveToast"
         class="toast align-items-center text-bg-success border-0"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">

        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
                Success
            </div>

            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>
        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
